<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
/* ---------- MOBILE BASE ---------- */
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #fff7f8, #ffeef1);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #444;
}

/* ---------- FLOATING HEARTS ---------- */
.heart {
  position: absolute;
  bottom: -20px;
  color: #ff8fa3;
  font-size: 14px;
  animation: floatUp linear infinite;
  opacity: 0.6;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0; }
  30% { opacity: 0.6; }
  100% { transform: translateY(-110vh); opacity: 0; }
}

/* ---------- CARD (MOBILE CENTER) ---------- */
.box {
  width: 92%;
  max-width: 360px;
  text-align: center;
  padding: 22px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-radius: 22px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.06);
}

/* ---------- NAME ---------- */
.name {
  font-size: 34px;
  font-weight: 700;
  color: #ff5c77;
  margin-bottom: 15px;
}

/* ---------- TEXT ---------- */
.text {
  font-size: 17px;
  line-height: 1.6;
  min-height: 80px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.4s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* ---------- BUTTON (MOBILE FRIENDLY) ---------- */
button {
  margin-top: 18px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 30px;
  background: #ff8fa3;
  color: white;
  font-size: 16px;
  touch-action: manipulation;
}

button:active {
  transform: scale(0.98);
}

/* ---------- SOFT FADE ---------- */
</style>
</head>

<body>

<!-- FLOATING HEARTS -->
<script>
for (let i = 0; i < 18; i++) {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (4 + Math.random() * 5) + "s";
  h.style.fontSize = (10 + Math.random() * 12) + "px";
  document.body.appendChild(h);
}
</script>

<!-- CONTENT -->
<div class="box">

  <div class="name">Roman</div>

  <div id="text" class="text show">
    Hey…
  </div>

  <button onclick="next()">Tap</button>

</div>

<script>
const messages = [
  "I made this small thing.",
  "I just wanted to be honest with you.",
  "Ich liebe dich so sehr.",
  "That’s all."
];

let i = 0;
const text = document.getElementById("text");

function next() {
  text.classList.remove("show");

  setTimeout(() => {
    if (i < messages.length) {
      text.innerHTML = messages[i];
      text.classList.add("show");
      i++;
    } else {
      text.innerHTML = "You don’t need to reply… I just wanted you to know.";
      text.classList.add("show");
    }
  }, 200);
}
</script>

</body>
</html>
